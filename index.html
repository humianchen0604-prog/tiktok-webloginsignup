<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikTok — Login Prototype</title>
<link rel="stylesheet" href="shared.css" />
</head>
<body>

<div class="scale-wrapper" id="scaleWrap">
  <div class="tt-root" id="ttRoot">

    <!-- SIDEBAR -->
    <div class="tt-sidebar">
      <div class="tt-nav-container">
        <img src="Assets/Icons/TikTok Logo.svg" width="116" height="28" alt="TikTok" />
      </div>
      <div class="tt-search">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="8" cy="8" r="5.5" stroke="rgba(0,0,0,0.4)" stroke-width="1.5"/>
          <path d="M12.5 12.5L16 16" stroke="rgba(0,0,0,0.4)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Search
      </div>
      <div class="tt-nav-section">
        <div class="tt-nav-items">
          <div class="tt-nav-item"><div class="tt-nav-icon"><img src="Assets/Icons/Home.svg" width="24" height="24" alt="" /></div>For you</div>
          <div class="tt-nav-item"><div class="tt-nav-icon"><img src="Assets/Icons/Compass.svg" width="24" height="24" alt="" /></div>Explore</div>
          <div class="tt-nav-item"><div class="tt-nav-icon"><img src="Assets/Icons/Frame 2036081282.svg" width="24" height="24" alt="" /></div>Following</div>
          <div class="tt-nav-item"><div class="tt-nav-icon"><img src="Assets/Icons/Two_Person.svg" width="24" height="24" alt="" /></div>Friends</div>
          <div class="tt-nav-item"><div class="tt-nav-icon"><img src="Assets/Icons/Bottom_Create.svg" width="24" height="24" alt="" /></div>Upload</div>
          <div class="tt-nav-item"><div class="tt-nav-icon"><img src="Assets/Icons/Live_Wave.svg" width="24" height="24" alt="" /></div>LIVE</div>
          <div class="tt-nav-item"><div class="tt-nav-icon"><img src="Assets/Icons/Ellipsis_Horizontal.svg" width="24" height="24" alt="" /></div>More</div>
        </div>
        <button class="tt-left-nav-btn" onclick="window.location.href='flow1.html'">Log in</button>
        <div class="tt-divider"></div>
        <div class="tt-footer">
          <div class="tt-footer-links"><span>Company</span><span>Programs</span><span>Terms &amp; Policies</span></div>
          <div>© 2026 TikTok</div>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="tt-page">
      <img src="Assets/Images/FYP.png" alt="TikTok For You Page" />
    </div>

    <!-- TOOLBAR -->
    <div class="tt-topnav">
      <div class="toolbar">
        <div class="toolbar-pills">
          <button class="toolbar-pill-btn"><img src="Assets/Icons/tiktok_logo_circle.svg" alt="" />Get coin</button>
          <button class="toolbar-pill-btn"><img src="Assets/Icons/SMS.svg" alt="" />Get App</button>
          <button class="toolbar-pill-btn"><img src="Assets/Icons/Arrow_Down_To_Line.svg" alt="" />PC App</button>
        </div>
        <button class="toolbar-login-btn" onclick="window.location.href='flow1.html'">Login</button>
      </div>
    </div>

  </div>
</div>

<!-- PEEPHOLE BUTTON -->
<div id="peepholeBtn" onclick="toggleFlowSelector()">
  <img src="Assets/Icons/Eye_Open.svg" id="peepholeIcon" width="24" height="24" alt="Choose flow" />
</div>

<!-- FLOW SELECTOR PANEL -->
<div id="flowSelector" style="
  display:none; position:fixed; bottom:84px; right:24px;
  background:white; border-radius:16px;
  box-shadow:0px 4px 24px rgba(0,0,0,0.15);
  padding:16px; width:280px; z-index:99998;
  font-family:'TikTokSans',-apple-system,sans-serif;
">
  <div style="font-size:12px;font-weight:600;color:rgba(0,0,0,0.48);
    text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;">
    Choose Login Flow
  </div>

  <a href="flow1.html" style="text-decoration:none;display:block;margin-bottom:8px;">
    <div style="padding:10px 14px;border-radius:10px;
      border:1.5px solid #FE2C55;background:rgba(254,44,85,0.05);
      font-size:14px;font-weight:600;color:#FE2C55;cursor:pointer;">
      ✦ Flow 1 — Current (Mock Online)
    </div>
  </a>

  <a href="flow2.html" style="text-decoration:none;display:block;margin-bottom:8px;">
    <div style="padding:10px 14px;border-radius:10px;
      border:1.5px solid rgba(0,0,0,0.1);background:white;
      font-size:14px;font-weight:600;color:#202020;cursor:pointer;">
      Flow 2 — QR + 1P (Phone/Email focus)
    </div>
  </a>

  <a href="flow3.html" style="text-decoration:none;display:block;">
    <div style="padding:10px 14px;border-radius:10px;
      border:1.5px solid rgba(0,0,0,0.1);background:white;
      font-size:14px;font-weight:600;color:#202020;cursor:pointer;">
      Flow 3 — QR + 3P (All buttons)
    </div>
  </a>
</div>

<script src="shared.js"></script>
<script>
  var flowSelectorOpen = false;

  function toggleFlowSelector() {
    flowSelectorOpen = !flowSelectorOpen;
    document.getElementById('flowSelector').style.display = flowSelectorOpen ? 'block' : 'none';
    document.getElementById('peepholeIcon').src = flowSelectorOpen
      ? 'Assets/Icons/Eye_Close.svg' : 'Assets/Icons/Eye_Open.svg';
  }

  document.addEventListener('click', function(e) {
    var selector = document.getElementById('flowSelector');
    var btn = document.getElementById('peepholeBtn');
    if (flowSelectorOpen && !selector.contains(e.target) && !btn.contains(e.target)) {
      selector.style.display = 'none';
      document.getElementById('peepholeIcon').src = 'Assets/Icons/Eye_Open.svg';
      flowSelectorOpen = false;
    }
  });
</script>
</body>
</html>
